name: 500 Commits in 30 Days

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate realistic commits
        run: |
          git config --global user.name "Shubham"
          git config --global user.email "shubhamsharmaa5aug@gmail.com"

          START_DATE=$(date -d "30 days ago" +%Y-%m-%d)

          for day in {0..29}
          do
            DATE=$(date -d "$START_DATE +$day days" +"%Y-%m-%d")

            # Random commits per day (10–20)
            COUNT=$((RANDOM % 11 + 10))

            for i in $(seq 1 $COUNT)
            do
              echo "Commit $i on $DATE" >> commits.txt
              git add .
              GIT_AUTHOR_DATE="$DATE 12:$i:00" GIT_COMMITTER_DATE="$DATE 12:$i:00" git commit -m "Commit $i on $DATE"
            done
          done

          git push
