
<div style="padding: 12px 0;">
  <div style="display:flex; flex-wrap:wrap; gap:16px; margin-bottom:12px; font-size:12px; color:var(--color-text-secondary);">
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:#2196F3;"></span>Temp (°C)</span>
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:#FF9800;"></span>Humidity (%)</span>
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:#4CAF50;"></span>MQ2</span>
    <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:2px;background:#F44336;"></span>Air Quality</span>
  </div>
  <div style="position:relative;width:100%;height:340px;">
    <canvas id="sensorChart"></canvas>
  </div>
  <div style="text-align:center;font-size:11px;color:var(--color-text-tertiary);margin-top:8px;">Time →</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const totalPoints = 80;

function makeBase(start, noise, dip, dipAt, dipLen, recover) {
  return Array.from({length: totalPoints}, (_, i) => {
    let v = start + (Math.random() - 0.5) * noise;
    if (i >= dipAt && i < dipAt + dipLen) {
      const progress = (i - dipAt) / dipLen;
      v = start + (dip - start) * Math.sin(progress * Math.PI);
    }
    if (recover && i >= dipAt + dipLen) {
      const fade = Math.exp(-(i - dipAt - dipLen) * 0.07);
      v = start + (dip - start) * fade + (Math.random() - 0.5) * noise * 0.5;
    }
    return Math.round(v * 10) / 10;
  });
}

const tempData     = makeBase(28, 3, 24, 20, 18, true);
const humidityData = makeBase(260, 12, 380, 18, 22, true);
const mq2Data      = makeBase(310, 15, 430, 17, 25, true);
const airQData     = makeBase(50, 8, 110, 19, 20, true);

const labels = Array.from({length: totalPoints}, (_, i) => i);

new Chart(document.getElementById('sensorChart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      {
        label: 'Temp (°C)',
        data: tempData,
        borderColor: '#2196F3',
        backgroundColor: 'transparent',
        borderWidth: 1.8,
        pointRadius: 2.5,
        pointBackgroundColor: '#2196F3',
        tension: 0.3
      },
      {
        label: 'Humidity (%)',
        data: humidityData,
        borderColor: '#FF9800',
        backgroundColor: 'transparent',
        borderWidth: 1.8,
        pointRadius: 2.5,
        pointBackgroundColor: '#FF9800',
        tension: 0.3
      },
      {
        label: 'MQ2',
        data: mq2Data,
        borderColor: '#4CAF50',
        backgroundColor: 'transparent',
        borderWidth: 1.8,
        pointRadius: 2.5,
        pointBackgroundColor: '#4CAF50',
        tension: 0.3
      },
      {
        label: 'Air Quality',
        data: airQData,
        borderColor: '#F44336',
        backgroundColor: 'transparent',
        borderWidth: 1.8,
        pointRadius: 2.5,
        pointBackgroundColor: '#F44336',
        tension: 0.3
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      title: {
        display: true,
        text: 'Live Sensor Data',
        color: '#888',
        font: { size: 13, weight: '400' },
        padding: { bottom: 10 }
      },
      tooltip: {
        callbacks: {
          label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y
        }
      }
    },
    scales: {
      x: {
        title: { display: false },
        ticks: {
          maxTicksLimit: 12,
          color: '#888',
          font: { size: 10 }
        },
        grid: { color: 'rgba(150,150,150,0.15)' }
      },
      y: {
        title: { display: true, text: 'Sensor Values', color: '#888', font: { size: 11 } },
        min: 0,
        max: 500,
        ticks: { color: '#888', font: { size: 10 }, stepSize: 100 },
        grid: { color: 'rgba(150,150,150,0.15)' }
      }
    }
  }
});
</script>
